name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'electron/**'
      - 'src/**'
      - 'scripts/**'
      - 'electron-builder.yml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force release even if version tag already exists'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag_exists: ${{ steps.check.outputs.tag_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version tag exists
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION already exists"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "New version v$VERSION detected"
          fi

          # Release if: new version OR manual trigger with force
          TAG_EXISTS=$(git rev-parse "v$VERSION" >/dev/null 2>&1 && echo "true" || echo "false")
          IS_MANUAL="${{ github.event_name == 'workflow_dispatch' }}"
          FORCE="${{ github.event.inputs.force }}"

          if [ "$TAG_EXISTS" = "false" ] || ([ "$IS_MANUAL" = "true" ] && [ "$FORCE" = "true" ]); then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  create-tag:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true' && needs.check-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

  release:
    needs: [check-version, create-tag]
    if: |
      always() &&
      needs.check-version.outputs.should_release == 'true' &&
      (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Windows: set UTF-8 encoding and use short cache path to avoid
      # ERR_ELECTRON_BUILDER_CANNOT_EXECUTE from path length / encoding issues
      - name: Configure Windows build environment
        if: matrix.platform == 'win'
        run: |
          chcp 65001
          mkdir C:\eb-cache 2>nul
        shell: cmd

      - name: Build Next.js
        run: npm run build

      - name: Bundle server
        run: node scripts/build-server.mjs

      - name: Build and Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_CACHE: ${{ matrix.platform == 'win' && 'C:\eb-cache' || '' }}
        run: npx electron-builder --${{ matrix.platform }} --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.AppImage
            dist-electron/*.exe
            dist-electron/*.yml
            dist-electron/*.yaml
          if-no-files-found: ignore
