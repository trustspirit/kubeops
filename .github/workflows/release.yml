name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'electron/**'
      - 'src/**'
      - 'scripts/**'
      - 'electron-builder.yml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force release even if version tag already exists'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
      tag_exists: ${{ steps.check.outputs.tag_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version and changed files
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Check if version tag already exists
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            TAG_EXISTS="true"
            echo "Tag v$VERSION already exists"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            TAG_EXISTS="false"
            echo "New version v$VERSION detected"
          fi

          # Check if version changed from previous commit
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")
          if [ "$VERSION" != "$PREVIOUS" ]; then
            VERSION_CHANGED="true"
          else
            VERSION_CHANGED="false"
          fi

          # Check if source files changed (needs Electron rebuild)
          SOURCE_CHANGED="false"
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -qE '^(package\.json|electron/|src/|scripts/|electron-builder\.yml)'; then
            SOURCE_CHANGED="true"
          fi

          IS_MANUAL="${{ github.event_name == 'workflow_dispatch' }}"
          FORCE="${{ github.event.inputs.force }}"

          # Electron release: source changed + new version, or manual force
          if ([ "$SOURCE_CHANGED" = "true" ] && [ "$TAG_EXISTS" = "false" ]) || ([ "$IS_MANUAL" = "true" ] && [ "$FORCE" = "true" ]); then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

          # npm publish: version changed, or manual force
          if [ "$VERSION_CHANGED" = "true" ] || ([ "$IS_MANUAL" = "true" ] && [ "$FORCE" = "true" ]); then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  create-tag:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true' && needs.check-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

  release:
    needs: [check-version, create-tag]
    if: |
      always() &&
      needs.check-version.outputs.should_release == 'true' &&
      (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Windows: set UTF-8 encoding and use short cache path to avoid
      # ERR_ELECTRON_BUILDER_CANNOT_EXECUTE from path length / encoding issues
      - name: Configure Windows build environment
        if: matrix.platform == 'win'
        run: |
          chcp 65001
          mkdir C:\eb-cache 2>nul
        shell: cmd

      - name: Build Next.js
        run: npm run build

      - name: Bundle server
        run: node scripts/build-server.mjs

      - name: Build and Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_CACHE: ${{ matrix.platform == 'win' && 'C:\eb-cache' || '' }}
        run: npx electron-builder --${{ matrix.platform }} --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.AppImage
            dist-electron/*.exe
            dist-electron/*.yml
            dist-electron/*.yaml
          if-no-files-found: ignore

  npm-publish:
    needs: [check-version, release]
    if: |
      always() &&
      needs.check-version.outputs.should_publish == 'true' &&
      needs.check-version.result == 'success' &&
      (needs.release.result == 'success' || needs.release.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Authenticate npm
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.TRUST_NPM }}" > ~/.npmrc

      - name: Publish to npm
        run: npm publish
